<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium 3D Dashboard</title>
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at center, #2c3e50 0%, #000000 100%);
            --panel-bg: rgba(255, 255, 255, 0.1);
            --accent-color: #00d2ff;
            --transition-speed: 0.5s;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: var(--bg-gradient);
            font-family: 'Inter', -apple-system, sans-serif;
            color: white;
        }

        /* 初始載入提示 */
        #loader-overlay {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            transition: opacity 0.5s ease;
        }

        /* Dashboard 基礎樣式 */
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            transition: transform var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
            position: fixed;
            z-index: 50;
        }

        #dashboard {
            visibility: hidden; /* 初始隱藏，載入完畢才顯示 */
        }

        /* 電腦端佈局 (右側收合) */
        @media (min-width: 769px) {
            #dashboard {
                top: 0;
                right: 0;
                width: 300px;
                height: 100vh;
                border-radius: 20px 0 0 20px;
                padding: 40px 24px;
                transform: translateX(100%);
            }
            #dashboard.active {
                transform: translateX(0);
            }
            .toggle-btn {
                position: absolute;
                left: -50px;
                top: 50%;
                transform: translateY(-50%);
            }
        }

        /* 手機端佈局 (底部收合) */
        @media (max-width: 768px) {
            #dashboard {
                bottom: 0;
                left: 0;
                width: 100%;
                height: 30vh;
                border-radius: 20px 20px 0 0;
                padding: 24px;
                transform: translateY(100%);
            }
            #dashboard.active {
                transform: translateY(0);
            }
            .toggle-btn {
                position: absolute;
                top: -50px;
                left: 50%;
                transform: translateX(-50%);
            }
        }

        /* 收合按鈕樣式 */
        .toggle-btn {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        h1 {
            margin: 0 0 16px 0;
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        .status {
            font-size: 0.9rem;
            display: flex;
            align-items: center;
        }

        .status::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--accent-color);
            border-radius: 50%;
            margin-right: 12px;
            box-shadow: 0 0 10px var(--accent-color);
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

    <div id="loader-overlay" class="glass-panel" style="padding: 20px; border-radius: 12px;">
        <div class="status" id="load-status">正在載入 3D 資源...</div>
    </div>

    <div id="dashboard" class="glass-panel">
        <button class="toggle-btn" id="toggle-btn">DASHBOARD</button>
        <h1>System Monitor</h1>
        <div class="status">模型預覽中 - 穩定</div>
        <p style="opacity: 0.5; font-size: 0.8rem; margin-top: 20px;">
            環境光補償: 已開啟<br>
            動態渲染: 穩定
        </p>
    </div>

    <div id="canvas-container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls;
        const loaderOverlay = document.getElementById('loader-overlay');
        const dashboard = document.getElementById('dashboard');
        const toggleBtn = document.getElementById('toggle-btn');

        // 控制收合邏輯
        toggleBtn.addEventListener('click', () => {
            dashboard.classList.toggle('active');
        });

        init();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(3, 2, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const spotLight = new THREE.SpotLight(0xffffff, 50);
            spotLight.position.set(5, 10, 5);
            scene.add(spotLight);

            loadModel();

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        async function loadModel() {
            const loader = new GLTFLoader();
            const textureLoader = new THREE.TextureLoader();

            try {
                const gltf = await loader.loadAsync('./model.glb');
                const model = gltf.scene;

                model.traverse((child) => {
                    if (child.isMesh && child.material) {
                        const matName = child.material.name;
                        if (matName) {
                            const texturePath = `./${matName}.jpg`; 
                            textureLoader.load(texturePath, (tex) => {
                                tex.flipY = false;
                                tex.colorSpace = THREE.SRGBColorSpace;
                                child.material.map = tex;
                                child.material.needsUpdate = true;
                            });
                        }
                    }
                });

                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                model.position.sub(center);
                scene.add(model);

                // --- 狀態切換邏輯 ---
                loaderOverlay.style.opacity = '0'; // 隱藏載入提示
                setTimeout(() => {
                    loaderOverlay.style.display = 'none';
                    dashboard.style.visibility = 'visible'; // 顯示 Dashboard
                    dashboard.classList.add('active'); // 預設展開
                }, 500);

            } catch (error) {
                document.getElementById('load-status').innerText = "載入失敗";
                console.error(error);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
