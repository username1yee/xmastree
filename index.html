<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium 3D Dashboard</title>
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at center, #2c3e50 0%, #000000 100%);
            --panel-bg: rgba(255, 255, 255, 0.1);
            --accent-color: #00d2ff;
            --transition-speed: 0.5s;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: var(--bg-gradient);
            font-family: 'Inter', -apple-system, sans-serif;
            color: white;
        }

        /* 初始載入方格 (置中) */
        #loading-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            transition: opacity 0.5s ease;
        }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* Dashboard 基礎設定 */
        #dashboard {
            position: fixed;
            z-index: 50;
            transition: transform var(--transition-speed) cubic-bezier(0.19, 1, 0.22, 1);
            display: none; /* 初始隱藏 */
        }

        /* 電腦端：右側面板 */
        @media (min-width: 769px) {
            #dashboard {
                top: 20px;
                right: 20px;
                bottom: 20px;
                width: 300px;
                transform: translateX(120%); /* 預設收縮在右側之外 */
            }
            #dashboard.active {
                transform: translateX(0);
                display: block;
            }
        }

        /* 手機端：底部面板 */
        @media (max-width: 768px) {
            #dashboard {
                left: 10px;
                right: 10px;
                bottom: 10px;
                height: 200px;
                transform: translateY(120%); /* 預設收縮在底部之外 */
            }
            #dashboard.active {
                transform: translateY(0);
                display: block;
            }
        }

        .dashboard-content {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .status {
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            letter-spacing: 1px;
        }

        .status::before {
            content: '';
            display: inline-block;
            width: 10px;
            height: 10px;
            background: var(--accent-color);
            border-radius: 50%;
            margin-right: 12px;
            box-shadow: 0 0 10px var(--accent-color);
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
        }

        /* 收縮按鈕 */
        #toggle-btn {
            position: absolute;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 10px;
            top: 10px;
            right: 10px;
        }
    </style>
</head>
<body>

    <div id="loading-overlay" class="glass-panel">
        <h1 style="margin:0; font-size: 1.2rem; font-weight: 300;">Model Preview</h1>
        <p id="loading-text" style="font-size: 0.8rem; opacity: 0.6;">資源加載中...</p>
    </div>

    <div id="dashboard" class="glass-panel">
        <button id="toggle-btn">HIDE</button>
        <div class="dashboard-content">
            <div class="status">模型預覽中 - 穩定</div>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls;
        const loadingOverlay = document.getElementById('loading-overlay');
        const dashboard = document.getElementById('dashboard');
        const toggleBtn = document.getElementById('toggle-btn');

        init();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(3, 2, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const spotLight = new THREE.SpotLight(0xffffff, 50);
            spotLight.position.set(5, 10, 5);
            scene.add(spotLight);

            loadModel();

            // Dashboard 收縮邏輯
            toggleBtn.onclick = () => {
                const isHidden = dashboard.style.transform.includes('120%');
                dashboard.style.transform = isHidden ? '' : (window.innerWidth > 768 ? 'translateX(120%)' : 'translateY(120%)');
                toggleBtn.innerText = isHidden ? 'HIDE' : 'SHOW';
            };

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        async function loadModel() {
            const loader = new GLTFLoader();
            const textureLoader = new THREE.TextureLoader();

            try {
                const gltf = await loader.loadAsync('./model.glb');
                const model = gltf.scene;

                model.traverse((child) => {
                    if (child.isMesh) {
                        // 1. 處理材質與貼圖
                        if (child.material) {
                            const matName = child.material.name;
                            if (matName) {
                                textureLoader.load(`./${matName}.jpg`, (tex) => {
                                    tex.flipY = false;
                                    tex.colorSpace = THREE.SRGBColorSpace;
                                    child.material.map = tex;
                                    child.material.needsUpdate = true;
                                });
                            }
                        }

                        // 2. 處理 _-sub 結尾的物件 (細分)
                        if (child.name.endsWith('_-sub')) {
                            // 在 WebGL 中增加細分通常是重新計算法線並平滑處理
                            // 設定細分感官上的數值 (這裡透過修改材質平滑度模擬 subdivision 效果)
                            child.material.flatShading = false;
                            child.geometry.computeVertexNormals();
                            // 註：真正的幾何細分在瀏覽器端極度耗能，通常會在建模軟體導出。
                            // 這裡模擬數值 2 的效果，強化平滑細節。
                            console.log(`已對 ${child.name} 應用平滑細分設定`);
                        }
                    }
                });

                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                model.position.sub(center);
                scene.add(model);

                // 載入完成：更換介面
                loadingOverlay.style.opacity = '0';
                setTimeout(() => {
                    loadingOverlay.style.display = 'none';
                    dashboard.style.display = 'block';
                    // 觸發進場動畫
                    setTimeout(() => dashboard.classList.add('active'), 50);
                }, 500);

            } catch (error) {
                document.getElementById('loading-text').innerText = "錯誤：找不到 model.glb";
                console.error(error);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
