<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026聖誕樹設計大餅</title>
    <meta name="description" content="摩西分海/應許之地">
    <meta property="og:type" content="website">
    <meta property="og:url" content="你的網頁網址"> <meta property="og:title" content="2026聖誕樹設計大餅">
    <meta property="og:description" content="摩西分海/應許之地">
    <meta property="og:image" content="banner.png"> <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at center, #2c3e50 0%, #000000 100%);
            --panel-bg: rgba(255, 255, 255, 0.15);
            --accent-color: #00d2ff;
            --transition-speed: 0.5s;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: var(--bg-gradient);
            font-family: 'Inter', -apple-system, sans-serif;
            color: white;
        }

        #loader-overlay {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            transition: opacity 0.5s ease;
        }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            transition: transform var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1), opacity var(--transition-speed);
            position: fixed;
            z-index: 50;
        }

        #dashboard { visibility: hidden; }

        @media (min-width: 769px) {
            #dashboard { top: 0; right: 0; width: 300px; height: 100vh; border-radius: 20px 0 0 20px; padding: 40px 24px; transform: translateX(100%); }
            #dashboard.active { transform: translateX(0); }
            .toggle-btn { position: absolute; left: -40px; top: 50%; transform: translateY(-50%) rotate(-90deg); transform-origin: center; padding: 8px 20px; }
        }

        @media (max-width: 768px) {
            #dashboard { top: 50%; left: 50%; width: 80%; max-width: 300px; border-radius: 20px; padding: 30px; transform: translate(-50%, -50%) scale(0.8); opacity: 0; pointer-events: none; }
            #dashboard.active { transform: translate(-50%, -50%) scale(1); opacity: 1; pointer-events: auto; }
            .toggle-btn { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 60; }
        }

        .toggle-btn {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 11px;
            letter-spacing: 2px;
            white-space: nowrap;
        }

        h1 { margin: 0 0 16px 0; font-size: 1.1rem; font-weight: 300; letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        
        .status { font-size: 0.9rem; display: flex; align-items: center; }
        .status::before { content: ''; display: inline-block; width: 8px; height: 8px; background: var(--accent-color); border-radius: 50%; margin-right: 12px; box-shadow: 0 0 10px var(--accent-color); }

        .option-item {
            margin-top: 15px;
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 0.85rem;
            opacity: 0.8;
            transition: opacity 0.3s;
        }
        .option-item:hover { opacity: 1; }
        .option-item input { margin-right: 10px; cursor: pointer; accent-color: var(--accent-color); }

        #canvas-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <div id="loader-overlay" class="glass-panel" style="padding: 20px; border-radius: 12px;">
        <div class="status" id="load-status">正在載入 3D 資源...</div>
    </div>

    <audio id="uiiai-audio" src="./uiiai.mp3" loop></audio>

    <button class="toggle-btn" id="toggle-btn" style="display:none;">DASHBOARD</button>

    <div id="dashboard" class="glass-panel">
        <h1>2026聖誕樹設計大餅</h1>
        <div class="status">模型預覽中 - 穩定</div>
        <p style="opacity: 0.5; font-size: 0.8rem; margin-top: 20px; margin-bottom: 5px;">
            環境光補償: 已開啟<br>
            動態渲染: 穩定
        </p>
        
        <label class="option-item">
            <input type="checkbox" id="uiiai-toggle"> UIIAI
        </label>
    </div>

    <div id="canvas-container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls, clock;
        let mainModel, uiiaiModel, mixer;
        
        const loaderOverlay = document.getElementById('loader-overlay');
        const dashboard = document.getElementById('dashboard');
        const toggleBtn = document.getElementById('toggle-btn');
        const uiiaiToggle = document.getElementById('uiiai-toggle');
        const uiiaiAudio = document.getElementById('uiiai-audio');

        toggleBtn.addEventListener('click', () => {
            dashboard.classList.toggle('active');
        });

        init();

        function init() {
            clock = new THREE.Clock();
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(3, 2, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const spotLight = new THREE.SpotLight(0xffffff, 50);
            spotLight.position.set(5, 10, 5);
            scene.add(spotLight);

            loadModels();

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        async function loadModels() {
            const loader = new GLTFLoader();
            const textureLoader = new THREE.TextureLoader();

            const applyTextures = (model) => {
                model.traverse((child) => {
                    if (child.isMesh && child.material) {
                        const matName = child.material.name;
                        if (matName) {
                            textureLoader.load(`./${matName}.jpg`, (tex) => {
                                tex.flipY = false;
                                tex.colorSpace = THREE.SRGBColorSpace;
                                child.material.map = tex;
                                child.material.needsUpdate = true;
                            });
                        }
                    }
                });
            };

            try {
                const gltfMain = await loader.loadAsync('./model.glb');
                mainModel = gltfMain.scene;
                applyTextures(mainModel);
                
                const box = new THREE.Box3().setFromObject(mainModel);
                const center = box.getCenter(new THREE.Vector3());
                mainModel.position.sub(center);
                scene.add(mainModel);

                const gltfUiiai = await loader.loadAsync('./uiiai.glb');
                uiiaiModel = gltfUiiai.scene;
                applyTextures(uiiaiModel);
                
                uiiaiModel.visible = false; 
                uiiaiModel.position.sub(center); 
                scene.add(uiiaiModel);

                if (gltfUiiai.animations.length > 0) {
                    mixer = new THREE.AnimationMixer(uiiaiModel);
                    const action = mixer.clipAction(gltfUiiai.animations[0]);
                    action.timeScale = 1.8; 
                    action.play();
                }

                // 修改後的勾選連動邏輯
                uiiaiToggle.addEventListener('change', (e) => {
                    const isChecked = e.target.checked;
                    uiiaiModel.visible = isChecked;
                    if (isChecked) {
                        uiiaiAudio.play().catch(err => console.log("等待用戶交互後播放音樂"));
                    } else {
                        uiiaiAudio.pause();
                        uiiaiAudio.currentTime = 0; // 重置音樂
                    }
                });

                loaderOverlay.style.opacity = '0';
                setTimeout(() => {
                    loaderOverlay.style.display = 'none';
                    dashboard.style.visibility = 'visible';
                    toggleBtn.style.display = 'block';
                    // 這裡移除了 dashboard.classList.add('active')，讓它預設隱藏
                }, 500);

            } catch (error) {
                document.getElementById('load-status').innerText = "載入失敗";
                console.error(error);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (mixer) mixer.update(delta);
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
