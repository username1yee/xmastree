<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium 3D Viewer - Dashboard</title>
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at center, #2c3e50 0%, #000000 100%);
            --panel-bg: rgba(255, 255, 255, 0.1);
            --accent-color: #00d2ff;
            --transition-speed: 0.4s;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: var(--bg-gradient);
            font-family: 'Inter', -apple-system, sans-serif;
            color: white;
        }

        /* 初始載入提示 */
        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 100;
        }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* Dashboard 基本設定 */
        #dashboard {
            position: fixed;
            z-index: 50;
            transition: transform var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
            display: none; /* 初始隱藏 */
        }

        /* 切換按鈕 */
        #toggle-btn {
            position: absolute;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 8px;
            z-index: 51;
        }

        /* 電腦版樣式：右側側邊欄 */
        @media (min-width: 769px) {
            #dashboard {
                top: 0;
                right: 0;
                width: 300px;
                height: 100vh;
                border-radius: 16px 0 0 16px;
                transform: translateX(0);
            }
            #dashboard.closed {
                transform: translateX(100%);
            }
            #toggle-btn {
                top: 20px;
                right: 320px;
                transition: right var(--transition-speed);
            }
            #dashboard.closed + #toggle-btn {
                right: 20px;
            }
        }

        /* 手機版樣式：底部向上升 */
        @media (max-width: 768px) {
            #dashboard {
                bottom: 0;
                left: 0;
                width: 100%;
                height: 40vh;
                border-radius: 20px 20px 0 0;
                transform: translateY(0);
            }
            #dashboard.closed {
                transform: translateY(100%);
            }
            #toggle-btn {
                bottom: calc(40vh + 20px);
                left: 50%;
                transform: translateX(-50%);
                transition: bottom var(--transition-speed);
            }
            #dashboard.closed + #toggle-btn {
                bottom: 20px;
            }
        }

        .dashboard-content {
            padding: 30px;
        }

        h1 {
            margin: 0 0 15px 0;
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .status {
            font-size: 0.9rem;
            display: flex;
            align-items: center;
        }

        .status::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--accent-color);
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 10px var(--accent-color);
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="status">正在載入模型資源...</div>
    </div>

    <div id="dashboard" class="glass-panel">
        <div class="dashboard-content">
            <h1>Dashboard</h1>
            <div class="status">模型預覽中 - 穩定</div>
        </div>
    </div>
    <button id="toggle-btn" style="display:none;">Menu</button>

    <div id="canvas-container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "three-subdivide": "https://cdn.jsdelivr.net/npm/three-subdivide@1.1.5/build/index.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { LoopSubdivision } from 'three-subdivide';

        let scene, camera, renderer, controls;
        const dashboard = document.getElementById('dashboard');
        const toggleBtn = document.getElementById('toggle-btn');
        const loader = document.getElementById('loader');

        // 切換面板邏輯
        toggleBtn.onclick = () => {
            dashboard.classList.toggle('closed');
            toggleBtn.innerText = dashboard.classList.contains('closed') ? 'Open' : 'Close';
        };

        init();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(3, 2, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const spotLight = new THREE.SpotLight(0xffffff, 50);
            spotLight.position.set(5, 10, 5);
            scene.add(spotLight);

            loadModel();

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        async function loadModel() {
            const gltfLoader = new GLTFLoader();
            const textureLoader = new THREE.TextureLoader();

            try {
                const gltf = await gltfLoader.loadAsync('./model.glb');
                const model = gltf.scene;

                // 處理模型物件
                model.traverse((child) => {
                    if (child.isMesh) {
                        // 1. Subdivision 邏輯: 檢查名稱結尾
                        if (child.name.endsWith('_-sub')) {
                            console.log(`對物件 ${child.name} 進行細分處理...`);
                            const iterations = 2;
                            // 使用 LoopSubdivision 進行細分
                            const subdividedGeometry = LoopSubdivision.modify(child.geometry, iterations, {
                                split: false,
                                uvSmooth: true,
                                preserveEdges: false,
                                flatOnly: false,
                                maxTriangles: 500000 // 安全門檻
                            });
                            child.geometry.dispose();
                            child.geometry = subdividedGeometry;
                        }

                        // 2. 貼圖自動匹配 (維持原有功能)
                        if (child.material) {
                            const matName = child.material.name;
                            if (matName) {
                                const texturePath = `./${matName}.jpg`;
                                textureLoader.load(texturePath, (tex) => {
                                    tex.flipY = false;
                                    tex.colorSpace = THREE.SRGBColorSpace;
                                    child.material.map = tex;
                                    child.material.needsUpdate = true;
                                }, undefined, () => {});
                            }
                        }
                    }
                });

                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                model.position.sub(center);
                scene.add(model);

                // 載入完成後的介面轉換
                loader.style.display = 'none';
                dashboard.style.display = 'block';
                toggleBtn.style.display = 'block';

            } catch (error) {
                console.error("載入失敗:", error);
                document.querySelector('#loader .status').innerText = "載入失敗，請確認檔案路徑";
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
