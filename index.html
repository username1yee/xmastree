<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium 3D Viewer</title>
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at center, #2c3e50 0%, #000000 100%);
            --panel-bg: rgba(255, 255, 255, 0.1);
            --accent-color: #00d2ff;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: var(--bg-gradient);
            font-family: 'Inter', -apple-system, sans-serif;
            color: white;
        }

        /* 介面樣式 */
        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            pointer-events: none;
        }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            pointer-events: auto;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1 {
            margin: 0 0 8px 0;
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .status {
            font-size: 0.85rem;
            opacity: 0.7;
            display: flex;
            align-items: center;
        }

        .status::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--accent-color);
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 10px var(--accent-color);
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <div class="glass-panel">
            <h1>Model Preview</h1>
            <div class="status" id="status">正在載入 3D 資源...</div>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls;
        const statusEl = document.getElementById('status');

        init();

        function init() {
            // 1. 場景設定
            scene = new THREE.Scene();
            
            // 2. 相機設定
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(3, 2, 5);

            // 3. 渲染器設定 (開啟抗鋸齒與色彩管理)
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // 4. 控制器
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // 5. 光照系統
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const spotLight = new THREE.SpotLight(0xffffff, 50);
            spotLight.position.set(5, 10, 5);
            scene.add(spotLight);

            // 6. 載入模型與自動匹配貼圖
            loadModel();

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        async function loadModel() {
            const loader = new GLTFLoader();
            const textureLoader = new THREE.TextureLoader();

            try {
                const gltf = await loader.loadAsync('./model.glb');
                const model = gltf.scene;

                // 遍歷模型中的所有 Mesh
                model.traverse((child) => {
                    if (child.isMesh && child.material) {
                        // 根據 Material 名字尋找同名貼圖 (支援 jpg 或 png)
                        const matName = child.material.name;
                        if (matName) {
                            // 這裡假設貼圖後綴為 .jpg，你可以根據需求調整邏輯
                            const texturePath = `./${matName}.jpg`; 
                            
                            textureLoader.load(texturePath, (tex) => {
                                tex.flipY = false; // GLTF 貼圖通常需要翻轉 Y 軸
                                tex.colorSpace = THREE.SRGBColorSpace;
                                child.material.map = tex;
                                child.material.needsUpdate = true;
                                console.log(`已成功為 ${matName} 載入貼圖`);
                            }, undefined, (err) => {
                                console.warn(`找不到貼圖: ${texturePath}`);
                            });
                        }
                    }
                });

                // 將模型置中
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                model.position.sub(center);

                scene.add(model);
                statusEl.innerText = "模型預覽中 - 穩定";
            } catch (error) {
                statusEl.innerText = "載入失敗: 請確保 model.glb 位於相同目錄";
                console.error(error);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
